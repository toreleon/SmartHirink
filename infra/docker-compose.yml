services:
  # ───────────────────────────────── PostgreSQL ──────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: smarthirink
      POSTGRES_PASSWORD: smarthirink_secret
      POSTGRES_DB: smarthirink
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U smarthirink']
      interval: 5s
      timeout: 5s
      retries: 5

  # ───────────────────────────────── Redis ───────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  # ───────────────────────────────── API ─────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    restart: unless-stopped
    stop_grace_period: 15s
    ports:
      - '4000:4000'
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://smarthirink:smarthirink_secret@postgres:5432/smarthirink
      REDIS_URL: redis://redis:6379  # Internal port unchanged
      AGENT_URL: http://agent:7860
      PORT: 4000
      HOST: 0.0.0.0
      APP_URL: http://localhost:3000
      REPORTS_DIR: /app/reports
    volumes:
      - reports:/app/reports
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:4000/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 3

  # ───────────────────────────────── Agent (Pipecat) ─────────────────────────
  agent:
    build:
      context: ..
      dockerfile: infra/Dockerfile.agent-pipecat
    restart: unless-stopped
    stop_grace_period: 15s
    ports:
      - '7860:7860'
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://smarthirink:smarthirink_secret@postgres:5432/smarthirink
      REDIS_URL: redis://redis:6379

  # ───────────────────────────────── Worker ──────────────────────────────────
  worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile.worker
    restart: unless-stopped
    stop_grace_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://smarthirink:smarthirink_secret@postgres:5432/smarthirink
      REDIS_URL: redis://redis:6379
      REPORTS_DIR: /app/reports
    volumes:
      - reports:/app/reports

  # ───────────────────────────────── Web ─────────────────────────────────────
  web:
    build:
      context: ..
      dockerfile: infra/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: ''
        API_PROXY_TARGET: http://api:4000
    restart: unless-stopped
    ports:
      - '3000:3000'
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: ''
      API_PROXY_TARGET: http://api:4000

volumes:
  pgdata:
  redisdata:
  reports:
